{% extends 'base.html' %}

{% block title %}Admin Login - DataMindsLab{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-primary text-white text-center py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-lock-fill me-2"></i>Admin Login</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="admin">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
