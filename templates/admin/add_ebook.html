{% extends 'base.html' %}

{% block title %}Add New eBook - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i>Add New eBook</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">eBook Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="e.g. Mastering Generative AI">
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label fw-bold">Author Name</label>
                        <input type="text" name="author" class="form-control" required placeholder="e.g. DataMindsLab Team">
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label fw-bold">Price (INR)</label>
                        <input type="number" step="0.01" name="price" class="form-control" required placeholder="499.00">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description</label>
                        <textarea name="description" class="form-control" rows="4" required placeholder="Comprehensive guide to..."></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cover_image" class="form-label fw-bold">Cover Image (.jpg, .png)</label>
                            <input type="file" name="cover_image" class="form-control" accept="image/*" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="ebook_file" class="form-label fw-bold">eBook PDF File (.pdf)</label>
                            <input type="file" name="ebook_file" class="form-control" accept=".pdf" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">Publish eBook</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
